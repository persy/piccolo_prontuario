name: Deploy Typst PDFs to Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- AGGIORNATO AL REPOSITORY UFFICIALE DELLA COMMUNITY ---
      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          version: ^0.14.0

      - name: Compile and Organize PDFs
        run: |
          # 1. Forza la creazione pulita della cartella dist e dist/pdf
          mkdir -p dist/pdf

          # 2. Copia la homepage HTML nella radice del sito finale
          if [ -f "docs/index.html" ]; then
            cp docs/index.html dist/
            echo "✅ Homepage index.html copiata con successo."
          else
            echo "⚠️ ATTENZIONE: docs/index.html non trovato!"
          fi
          
          # 3. Scansione ROBUSTA (cerca sia main.typ che Main.typ usando -iname)
          echo "Inizio scansione dei file sorgente Typst..."
          
          # Verifichiamo prima se esistono file utili per evitare che il ciclo giri a vuoto
          find docs -type f -iname "main.typ"
          
          find docs -type f -iname "main.typ" | while read -r file; do
            echo "------------------------------------------------"
            echo "📄 Trovato sorgente: $file"
            
            # Estrae il nome della cartella superiore (es. biologia)
            folder_name=$(basename "$(dirname "$file")")
            echo "📁 Materia rilevata: $folder_name"
            
            # Definisce il percorso finale (es. dist/pdf/biologia.pdf)
            target_pdf="dist/pdf/${folder_name}.pdf"
            
            echo "🚀 Compilazione in corso: $file -> $target_pdf"
            
            # Esegue la compilazione forzando l'uscita in caso di errore interno a Typst
            typst compile --root . "$file" "$target_pdf" || { echo "❌ Errore critico durante la compilazione di $file"; exit 1; }
            
            # Controllo di sicurezza per verificare se il PDF è stato davvero creato
            if [ -f "$target_pdf" ]; then
              echo "✨ PDF creato con successo! Dimensione: $(du -sh "$target_pdf" | cut -f1)"
            else
              echo "❌ Errore ignoto: Il comando è riuscito ma il file $target_pdf non esiste!"
            fi
          done
          
          echo "------------------------------------------------"
          echo "Visualizzazione contenuto finale della cartella dist/pdf:"
          ls -la dist/pdf/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4